# A prometheus-operator-managed Prometheus with the OTLP receiver enabled and
# translation_strategy: NoTranslation (so OTLP target labels are stored byte-for-byte).
# It is both the OTLP sink for the collector and — when .SelectGroup is set — the
# native scraper of the oracle ServiceMonitors. outOfOrderTimeWindow absorbs the
# reordering of OTLP export batches. Its ServiceAccount is granted discovery RBAC by
# the test (BindTargetAllocatorClusterRole).
apiVersion: v1
kind: ServiceAccount
metadata: {name: {{ .Name }}}
---
apiVersion: monitoring.coreos.com/v1
kind: Prometheus
metadata: {name: {{ .Name }}}
spec:
  serviceAccountName: {{ .Name }}
  replicas: 1
  enableOTLPReceiver: true
  otlp:
    translationStrategy: NoTranslation
  tsdb:
    outOfOrderTimeWindow: 30m
  scrapeInterval: 5s
  scrapeTimeout: 5s
{{- if .SelectGroup }}
  serviceMonitorSelector:
    matchLabels: {group: {{ .SelectGroup }}}
{{- end }}
