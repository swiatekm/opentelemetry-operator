# A collector whose target allocator discovers targets via prometheusCR, selecting
# only the ServiceMonitors labeled .Group, and exports OTLP to the oracle Prometheus.
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: {{ .Name }}
spec:
  mode: statefulset
  targetAllocator:
    enabled: true
    prometheusCR:
      enabled: true
      scrapeInterval: 5s
      serviceMonitorSelector:
        matchLabels: {group: {{ .Group }}}
  config:
    receivers:
      prometheus:
        config:
          scrape_configs: []
    exporters:
      otlphttp:
        endpoint: http://prometheus-operated:9090/api/v1/otlp
    service:
      pipelines:
        metrics:
          receivers: [prometheus]
          exporters: [otlphttp]
