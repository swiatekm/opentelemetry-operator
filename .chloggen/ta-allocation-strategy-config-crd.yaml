subtext: |
  The first option is the per-node strategy's fallback strategy, set via
  `spec.targetAllocator.allocationStrategyConfig.perNode.fallbackStrategy`, which is rendered as
  `allocation_strategy_config.per_node.fallback_strategy` in the target allocator configuration.
