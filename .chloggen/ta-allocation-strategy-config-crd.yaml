note: Add an `allocationStrategyConfig` field to the target allocator sections of the OpenTelemetryCollector and TargetAllocator CRDs, and pass it through to the generated target allocator ConfigMap.

# One or more tracking issues related to the change
issues: [5183]

# (Optional) One or more lines of additional information to render under the primary note.
